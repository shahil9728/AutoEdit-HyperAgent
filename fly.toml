# Fly.io app config — https://fly.io/docs/reference/configuration/
# First time:  fly launch --no-deploy   (or `fly apps create autoedit-backend`)
# Deploy:      fly deploy
# Auto-deploy on push: add the Fly GitHub Action (see DEPLOY.md).
app = "autoedit-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
